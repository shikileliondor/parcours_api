openapi: 3.0.3
info:
  title: Parcours API - Module Écoles
  version: 1.0.0
servers:
  - url: http://localhost:8000/api/v1
paths:
  /ecoles:
    get:
      summary: Liste des écoles
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: ville
          schema: { type: string }
        - in: query
          name: domaine
          schema: { type: string }
        - in: query
          name: type
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: per_page
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - in: query
          name: sort_by
          schema: { type: string, enum: [nom, ville, created_at], default: nom }
        - in: query
          name: sort_order
          schema: { type: string, enum: [asc, desc], default: asc }
      responses:
        '200':
          description: OK
  /ecoles/{id}:
    get:
      summary: Détail d'une école
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: OK }
        '404': { description: Introuvable }
  /ecoles/filters:
    get:
      summary: Options de filtres
      responses:
        '200': { description: OK }
  /admin/ecoles:
    post:
      summary: Créer une école (admin)
      security: [{ bearerAuth: [] }]
      responses:
        '201': { description: Créé }
  /admin/ecoles/{id}:
    patch:
      summary: Modifier une école (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: OK }
    delete:
      summary: Supprimer une école (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: OK }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
